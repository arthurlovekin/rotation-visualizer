<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <link data-trunk rel="copy-dir" href="assets" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --font-mono: 'JetBrains Mono', ui-monospace, 'Cascadia Code', 'Consolas', monospace;
        --bg-left: #1a1a2e;
        --bg-left-end: #12122a;
        --bg-right: #0d0d18;
        --bg-panel: #1e1e24;
        --color-primary: rgba(200, 235, 255, 0.95);
        --color-secondary: #8a9ca8;
        --color-muted: #5a6570;
        --color-tick: #2a3038;
        --accent: rgba(100, 200, 255, 0.85);
        --accent-muted: rgba(120, 160, 200, 0.5);
        --border: rgba(80, 100, 120, 0.4);
        --border-strong: rgba(80, 120, 160, 0.6);
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      .container {
        display: flex;
        height: 100%;
        width: 100%;
        --panel-left-width: 40%;
      }
      .panel-left {
        flex: 0 0 var(--panel-left-width);
        min-width: 200px;
        max-width: 80%;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      #leptos-app {
        flex: 1;
        min-width: 0;
        padding: 28px 24px;
        overflow-y: auto;
        background: linear-gradient(to right, var(--bg-left) 0%, var(--bg-left-end) 100%);
        color: var(--color-primary);
        font-family: var(--font-mono);
      }
      #leptos-app h1 {
        font-family: var(--font-mono);
        font-size: 1.4rem;
        font-weight: 500;
        color: var(--color-primary);
        letter-spacing: 0.02em;
        margin: 0 0 1em 0;
        padding: 0;
      }
      #leptos-app h2 {
        font-family: var(--font-mono);
        font-size: 1.2rem;
        font-weight: 500;
        color: var(--color-secondary);
        letter-spacing: 0.02em;
        margin: 0 0 0.6em 0;
        padding: 0;
      }
      #leptos-app .control-section {
        margin-bottom: 2.2em;
      }
      #leptos-app .control-section:last-child {
        margin-bottom: 0;
      }
      #leptos-app .section-header {
        display: flex;
        align-items: center;
        gap: 0.35em;
        margin-bottom: 0.6em;
      }
      #leptos-app .section-header .section-title {
        margin: 0;
      }
      #leptos-app .dropdown-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.4em;
        height: 1.4em;
        padding: 0;
        background: var(--bg-panel);
        color: var(--color-secondary);
        border: 1px solid var(--border);
        border-radius: 2px;
        cursor: pointer;
        font-size: 0.7em;
        flex-shrink: 0;
      }
      #leptos-app .dropdown-button:hover {
        color: var(--color-primary);
        border-color: var(--border-strong);
      }
      #leptos-app .dropdown-icon {
        display: inline-block;
        transition: transform 0.2s ease;
      }
      #leptos-app .dropdown-icon.collapsed {
        transform: rotate(-90deg);
      }
      #leptos-app .section-content {
        margin-top: 0;
      }
      #leptos-app .section-content.section-collapsed {
        display: none;
      }
      #leptos-app select {
        font-family: var(--font-mono);
        font-size: 0.85em;
        background: var(--bg-panel);
        color: var(--color-primary);
        border: 1px solid var(--border);
        border-radius: 2px;
        padding: 0.3em 0.5em;
        margin-left: 0.4em;
      }
      #leptos-app select:focus {
        outline: none;
        border-color: var(--border-strong);
      }
      #leptos-app .visibility-checkboxes {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4em 1em;
        margin-top: 0.5em;
      }
      #leptos-app .visibility-checkboxes label {
        display: flex;
        align-items: center;
        font-size: 0.85em;
        cursor: pointer;
        white-space: nowrap;
      }
      #leptos-app .convention-row {
        margin-bottom: 0.6em;
        font-size: 1.0em;
      }
      #leptos-app .graphics-controls {
        font-size: 1.0em;
      }
      #leptos-app .attributions {
        font-size: 1.0em;
      }
      .resize-handle {
        flex: 0 0 6px;
        cursor: col-resize;
        background: var(--border-strong);
        transition: background 0.15s ease;
      }
      .resize-handle:hover {
        background: var(--accent-muted);
      }
      .resize-handle:active {
        background: var(--accent);
      }
      .canvas-container {
        flex: 1;
        min-width: 200px;
        height: 100%;
        position: relative;
        background: linear-gradient(135deg, var(--bg-right) 0%, #0a0a14 50%, #080812 100%);
      }
      .canvas-container::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse at center, rgba(41, 35, 102, 0.18) 0%, transparent 55%),
          radial-gradient(ellipse at center, transparent 10%, rgba(3, 3, 18, 0.45) 100%);
        pointer-events: none;
        z-index: 1;
      }
      #three-canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
        position: relative;
        z-index: 0;
      }
      .red {
        color: red;
      }
      .vector-input {
        font-family: var(--font-mono);
        font-size: 0.9em;
        width: 61ch;
        padding: 0.35em 0.5em;
        margin-bottom: 0.8em;
        background: var(--bg-panel);
        color: var(--color-primary);
        border: 1px solid var(--border);
        border-radius: 2px;
        box-shadow: inset 0 0 0 1px rgba(80, 80, 90, 0.3),
                    inset 0 1px 2px rgba(0, 0, 0, 0.3);
      }
      .vector-input-3 {
        width: 49ch;
      }
      .vector-input-4 {
        width: 61ch;
      }
      .matrix-input {
        width: 49ch;
        min-height: 3em;
        resize: vertical;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="panel-left">
        <div id="leptos-app"></div>
      </div>
      <div class="resize-handle" id="resize-handle"></div>
      <div class="canvas-container">
        <canvas id="three-canvas"></canvas>
      </div>
    </div>
  </body>
</html>
