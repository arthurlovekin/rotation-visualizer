<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <link data-trunk rel="copy-dir" href="assets" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      .container {
        display: flex;
        height: 100%;
        width: 100%;
      }
      #leptos-app {
        flex: 1;
        min-width: 0; /* prevent flex item from overflowing */
        padding: 20px;
        overflow-y: auto;
        background: #1a1a2e;
        color: #eee;
      }
      .canvas-container {
        flex: 0 0 50%; /* don't grow, don't shrink, stay at 50% */
        height: 100%;
        position: relative;
      }
      #three-canvas {
        width: 100% !important;  /* override any inline styles */
        height: 100% !important;
        display: block;
      }
      .red {
        color: red;
      }
      .quat-sliders {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .quat-slider-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .quat-slider-label {
        min-width: 2em;
      }
      .dual-slider-track {
        position: relative;
        flex: 1;
        min-width: 80px;
        height: 20px;
        background: linear-gradient(to right, #333 0%, #555 50%, #333 100%);
        border-radius: 4px;
      }
      .dual-slider-handle {
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 14px;
        height: 14px;
        border-radius: 50%;
        cursor: grab;
        z-index: 1;
      }
      .dual-slider-handle:active {
        cursor: grabbing;
      }
      .dual-handle-pos {
        background: #4a9eff;
        border: 2px solid #6bb3ff;
      }
      .dual-handle-neg {
        background: #ff9e4a;
        border: 2px solid #ffb36b;
      }
      .quat-slider-value {
        font-family: monospace;
        min-width: 4.5em;
        font-size: 0.9em;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="leptos-app"></div>
      <div class="canvas-container">
        <canvas id="three-canvas"></canvas>
      </div>
    </div>
  </body>
</html>
